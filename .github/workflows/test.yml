name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build --target test -t inkdav-test ./app

      - name: Run tests
        run: docker run --rm inkdav-test
