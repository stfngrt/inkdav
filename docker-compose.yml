services:

  # ─── TRMNL BYOS (larapaper) ──────────────────────────────────────────────
  byos:
    image: ghcr.io/usetrmnl/larapaper:latest
    container_name: trmnl-byos
    restart: unless-stopped
    ports:
      - "4567:8080"
    environment:
      APP_KEY: "${BYOS_APP_KEY}"
      APP_URL: "http://${LOCAL_IP}:4567"
      APP_ENV: "production"
      REGISTRATION_ENABLED: "true"
      APP_TIMEZONE: "Europe/Berlin"
      DISPLAY_API_TIMEOUT: "30"
    volumes:
      - byos_data:/var/www/html/database
      # Mount the recipe Blade template into the Laravel views
    networks:
      - trmnl_net

  # ─── Calendar renderer sidecar ───────────────────────────────────────────
  # Fetches N CalDAV calendars, renders a week-grid PNG, serves it on :8080.
  # After each refresh it POSTs to any configured webhook URLs (e.g. BYOS).
  # Admin UI: http://localhost:5000
  calendar:
    build:
      context: ./calendar-sidecar
    container_name: trmnl-calendar
    restart: unless-stopped
    ports:
      - "8080:8080"        # PNG server (BYOS / debugging)
      - "5001:5000"        # Flask admin GUI
    environment:
      TZ: Europe/Berlin
      RENDER_WIDTH: "800"
      RENDER_HEIGHT: "480"
      REFRESH_SECONDS: "900"
    volumes:
      - calendar_config:/app/data   # persists config.json across restarts
    networks:
      - trmnl_net

volumes:
  byos_data:
  calendar_config:

networks:
  trmnl_net:
    driver: bridge
